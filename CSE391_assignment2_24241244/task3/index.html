<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>To-Do List</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header>
    <h1>My To-Do List</h1>
  </header>

  <main>
    <div class="todo-box">
      <div class="input-row">
        <input type="text" id="taskInput" placeholder="What do you need to do?">
        <button onclick="addTask()" title="Add this task">+ Add</button>
      </div>
      <p id="taskCounter" class="task-counter"></p>
      <ul id="taskList"></ul>
      <p id="emptyMessage" class="empty-message">No tasks yet. Add one above! 🎉</p>
    </div>
  </main>
  <footer>
    <p>CSE 391 - Assignment 2 - To-Do List</p>
  </footer>
  <script src="script.js"></script>
</body>
</html>
